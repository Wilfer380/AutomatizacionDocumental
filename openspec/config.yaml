rules:
  proposal:
    - Keep change scope small and reversible.
  specs:
    - Use Given/When/Then and RFC 2119 terms.
  design:
    - Explain the service boundaries and file impact.
  tasks:
    - Group by phase and keep tasks session-sized.
  apply:
    - Follow existing Python patterns.
    - TDD is disabled until a real test runner exists.
  verify:
    - No standard test command is available yet.
  archive:
    - Preserve traceability in the archive path.
