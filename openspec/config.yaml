schema: spec-driven

context: |
  Tech stack: Python 3.11+ desktop app.
  UI: Tkinter.
  Core libraries: openpyxl, python-docx, docx2pdf, pywin32.
  Architecture: UI + services + models + utilities.
  Flow: Phase 1 document generation; Phase 2 dossier simulation-first.
  Testing: no test runner, no test files, no lint/type/format config detected.
  Style: type-annotated modules, dataclasses, Windows-oriented path handling.

